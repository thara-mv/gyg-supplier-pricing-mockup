<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetYourGuide — Supplier Pricing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E0474C;--redH:#C73A3F;--redL:#FDE8E8;--redBg:#FFF5F5;
  --dk:#1A1A1A;--g900:#2D2D2D;--g700:#555;--g500:#8C8C8C;--g400:#ADADAD;--g300:#D1D1D1;--g200:#E8E8E8;--g100:#F3F3F3;--g50:#FAFAFA;
  --wh:#FFF;--grn:#00875A;--grnL:#E6F5EE;--amb:#D97706;--ambL:#FFF7ED;--blu:#0052CC;--bluL:#E6F0FF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--dk);min-height:100vh;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d1d1;border-radius:3px}

/* Layout */
.sidebar{width:248px;background:var(--wh);border-right:1px solid var(--g200);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;padding:24px 32px;overflow-y:auto;max-height:100vh}
.logo-wrap{padding:18px 18px 24px;display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
.logo-text{font-size:14px;font-weight:700;color:var(--dk);letter-spacing:-0.3px}
.logo-sub{font-size:9px;color:var(--g500);letter-spacing:2px;text-transform:uppercase}

/* Nav */
.nav-section{padding:0 10px;margin-bottom:6px}
.nav-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--g400);padding:12px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--g700);position:relative}
.nav-item:hover{background:var(--g50)}
.nav-item.active{background:var(--redBg);color:var(--red);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--red);border-radius:0 3px 3px 0}
.nav-item svg{flex-shrink:0}

.sidebar-footer{padding:14px;border-top:1px solid var(--g200);margin-top:auto}
.supplier-row{display:flex;align-items:center;gap:9px}
.supplier-avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),var(--amb));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

/* Cards & KPIs */
.card{background:var(--wh);border-radius:14px;border:1px solid var(--g200);padding:24px}
.card-title{font-size:15px;font-weight:700;color:var(--dk);margin:0 0 2px}
.card-sub{font-size:12px;color:var(--g500);margin:0 0 16px}
.kpi{background:var(--wh);border-radius:12px;border:1px solid var(--g200);padding:18px 20px}
.kpi.sm{padding:14px 16px}
.kpi-label{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:1.2px;font-weight:500;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;color:var(--dk);letter-spacing:-0.5px}
.kpi.sm .kpi-value{font-size:20px}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-green{color:var(--grn);background:var(--grnL)}.pill-red{color:var(--red);background:var(--redL)}
.pill-amber{color:var(--amb);background:var(--ambL)}.pill-blue{color:var(--blu);background:var(--bluL)}
.pill-gray{color:var(--g500);background:var(--g100)}

/* Status Badges */
.status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.status-optimal{background:var(--grnL);color:var(--grn)}.status-underpriced{background:var(--ambL);color:var(--amb)}.status-overpriced{background:var(--redL);color:var(--red)}

/* Buttons */
.btn{padding:8px 18px;border-radius:8px;border:1px solid var(--g200);background:var(--wh);color:var(--g700);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--g50)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-primary{background:var(--red);color:#fff;border:none}.btn-primary:hover{background:var(--redH)}

/* Grids */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}

/* Page Header */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.page-header h1{font-size:24px;font-weight:700;color:var(--dk);letter-spacing:-0.3px}
.page-header p{font-size:13px;color:var(--g500);margin-top:4px}

/* Tables */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:8px 10px;font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:1px;font-weight:500;border-bottom:1px solid var(--g200)}
.data-table td{padding:10px;border-bottom:1px solid var(--g100);font-size:13px;vertical-align:middle}
.data-table tbody tr:hover{background:var(--g50)}

/* Toggle */
.toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;transition:all .25s;background:var(--g300);position:relative;flex-shrink:0}
.toggle.on{background:var(--red)}
.toggle-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.toggle.on .toggle-thumb{left:23px}

/* Tabs */
.tab-bar{display:flex;gap:2px;background:var(--g100);border-radius:10px;padding:3px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .2s;background:transparent;color:var(--g500)}
.tab-btn.active{background:var(--wh);color:var(--dk);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Conf bar */
.conf-bar{display:flex;align-items:center;gap:6px}
.conf-track{width:50px;height:4px;background:var(--g100);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-val{font-size:10px;font-weight:600;color:var(--g500)}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .5s;min-height:3px}
.bar-label{font-size:10px;color:var(--g500)}

/* Heat cell */
.heat-cell{width:44px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* Editable price */
.edit-price{display:flex;align-items:center;gap:5px}
.edit-price .value{font-size:15px;font-weight:700}
.edit-price .value.custom{color:var(--blu)}
.edit-price .value.ai{color:var(--grn)}
.edit-btn{background:none;border:1px solid var(--g300);border-radius:4px;padding:2px;cursor:pointer;color:var(--g500);display:flex;transition:all .2s}
.edit-btn:hover{border-color:var(--red);color:var(--red)}
.custom-tag{font-size:9px;color:var(--blu);font-weight:700;background:var(--bluL);padding:2px 5px;border-radius:8px}
.edit-input{width:64px;padding:3px 6px;font-size:14px;font-weight:700;border:2px solid var(--red);border-radius:6px;outline:none;font-family:inherit;color:var(--dk)}
.edit-save{background:var(--grn);border:none;border-radius:4px;padding:3px;cursor:pointer;color:#fff;display:flex}
.edit-cancel{background:var(--g300);border:none;border-radius:4px;padding:3px;cursor:pointer;color:#fff;display:flex}
.reset-link{font-size:10px;color:var(--g500);background:none;border:none;cursor:pointer;text-decoration:underline;display:block;margin-top:2px;font-family:inherit;padding:0}

/* Quick nav items */
.quick-nav{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:4px}
.quick-nav:hover{background:var(--redBg);border-color:var(--redL)}

/* Insight card */
.insight-card{border-left:4px solid;padding:20px 24px}
.insight-card.critical{border-color:var(--red)}.insight-card.high{border-color:#E85D04}
.insight-card.medium{border-color:var(--amb)}.insight-card.low{border-color:var(--blu)}

/* Parity channel */
.parity-chan{flex:1;padding:10px 12px;border-radius:8px;background:var(--g50);border:1px solid var(--g200);text-align:center}
.parity-chan.lowest{background:var(--grnL);border-color:rgba(0,135,90,.2)}

/* Tooltip */
.tooltip-wrap{position:relative;display:inline-flex;cursor:help}
.tooltip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:100;pointer-events:none;display:none}
.tooltip-wrap:hover .tooltip-box{display:block}

/* Price range bar */
.price-range{position:relative;height:24px;border-radius:12px;overflow:visible;background:linear-gradient(90deg,var(--grnL),var(--ambL),var(--redL))}
.price-marker{position:absolute;top:-2px;transform:translateX(-50%);width:18px;height:28px;border-radius:6px;background:var(--red);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeIn .35s ease-out}

/* Hidden pages */
.page{display:none}
.page.active{display:block}
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">

      </div>

    <!-- OPERATIONS -->
    <div class="nav-section">
      <div class="nav-label">OPERATIONS</div>
      <div class="nav-item" data-page="payout">

      </div>
      <div class="nav-item" data-page="parity">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>

      </div>
      <div class="nav-item" data-page="ux">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg>
        Tools & Settings
      </div>

  </nav>
  <div class="sidebar-footer">
    <div class="supplier-row">

        <div style="font-size:10px;color:var(--g500)">Premium Supplier</div>
      </div>
    </div>
  </div>
</aside>

<!-- ═══ MAIN CONTENT ═══ -->
<main class="main" id="mainContent"></main>

<script>
// ═══ DATA ═══════════════════════════════════════════════════════
const EXP = [
  { id:1, name:"Colosseum Skip-the-Line", cat:"Walking Tour · 3h", icon:"🏛️", cur:54, sug:59, book30:342, rating:4.8, conf:92, cap:20, filled:16, adult:54, child:32, senior:45, group:48 },
  { id:2, name:"Colosseum Night Tour", cat:"Premium · 2.5h", icon:"🌙", cur:72, sug:84, book30:186, rating:4.9, conf:88, cap:15, filled:13, adult:72, child:45, senior:60, group:65 },
  { id:3, name:"Trastevere Food Walk", cat:"Food & Drink · 3.5h", icon:"🍕", cur:49, sug:49, book30:278, rating:4.7, conf:95, cap:12, filled:9, adult:49, child:30, senior:42, group:44 },
  { id:4, name:"Vatican Museums Express", cat:"Skip-the-line · 2h", icon:"🎨", cur:89, sug:82, book30:156, rating:4.5, conf:76, cap:25, filled:14, adult:89, child:55, senior:75, group:80 },
  { id:5, name:"Best of Rome Walking Tour", cat:"Walking Tour · 4h", icon:"⛲", cur:38, sug:42, book30:412, rating:4.6, conf:84, cap:18, filled:15, adult:38, child:22, senior:32, group:34 },
  { id:6, name:"Underground Catacombs", cat:"History · 2h", icon:"💀", cur:62, sug:68, book30:98, rating:4.4, conf:80, cap:10, filled:7, adult:62, child:38, senior:52, group:56 },
];
const COMP = [
  { name:"Walks of Italy", prices:{1:62,2:88,3:52,4:95,5:44,6:70}},
  { name:"Dark Rome Tours", prices:{1:58,2:82,3:55,4:85,5:40,6:65}},
  { name:"City Wonders", prices:{1:55,2:79,3:48,4:92,5:42,6:68}},
];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DEM_MONTH = [65,58,72,95,105,118,130,128,110,92,70,60];
const WEEKDAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DEM_WEEK = [70,68,72,78,95,130,120];
const PAYOUTS = [
  { date:"Mar 15, 2026", amount:12840, bookings:186, status:"scheduled" },
  { date:"Mar 01, 2026", amount:11620, bookings:168, status:"paid" },
  { date:"Feb 15, 2026", amount:10380, bookings:152, status:"paid" },
  { date:"Feb 01, 2026", amount:9840, bookings:144, status:"paid" },
];
const LOG = [
  { date:"Mar 01", action:"AI suggestion applied", detail:"Colosseum Skip-the-Line: €52 → €54", impact:"+3.7%" },
  { date:"Feb 26", action:"Seasonal rule triggered", detail:"All products +8% for Carnival week", impact:"+€2,340" },
  { date:"Feb 20", action:"Manual override", detail:"Vatican Express: €92 → €89", impact:"-3.3%" },
  { date:"Feb 14", action:"Last-minute discount", detail:"Food Walk: 12% off, filled 8 slots", impact:"+€392" },
  { date:"Feb 10", action:"Bulk price update", detail:"CSV import: 6 products updated", impact:"Neutral" },
];

// ═══ STATE ═══════════════════════════════════════════════════════
let state = {
  page: "overview",
  overrides: {},
  applied: new Set(),
  catTab: "all",
  rules: { seasonal:true, dayOfWeek:true, earlyBird:true, lastMin:false, capacity:true, events:false },
  simPrice: 54,
};

// ═══ HELPERS ═════════════════════════════════════════════════════
const fmt = n => "€" + Math.round(n).toLocaleString("de-DE");
const fmtD = n => "€" + n.toFixed(2).replace(".",",");
const getStatus = (cur, sug) => { const d = sug - cur; return Math.abs(d) < 1 ? "optimal" : d > 0 ? "underpriced" : "overpriced"; };
const pillClass = v => v.startsWith("+") ? "pill-green" : v.startsWith("-") ? "pill-red" : "pill-gray";
const confColor = v => v >= 85 ? "var(--grn)" : v >= 70 ? "var(--amb)" : "var(--red)";

function makeBar(data, labels, height, color, highlightIdx, maxOverride) {
  const mx = maxOverride || Math.max(...data);
  return `<div class="bar-chart" style="height:${height}px">${data.map((v,i) => 
    `<div class="bar-col"><span class="bar-val">${v}</span><div class="bar-fill" style="height:${(v/mx)*(height-30)}px;background:${i===highlightIdx?color:color+'55'}"></div>${labels?`<span class="bar-label">${labels[i]}</span>`:''}</div>`
  ).join('')}</div>`;
}

function makeConfBar(v) {
  return `<div class="conf-bar"><div class="conf-track"><div class="conf-fill" style="width:${v}%;background:${confColor(v)}"></div></div><span style="font-size:11px;color:var(--g500)">${v}%</span></div>`;
}

function makeKPI(label, value, change, type, small) {
  const colors = { up: { c: "var(--grn)", bg: "var(--grnL)" }, down: { c: "var(--red)", bg: "var(--redL)" }, amber: { c: "var(--amb)", bg: "var(--ambL)" }};
  const t = colors[type] || colors.up;
  return `<div class="kpi${small?' sm':''}"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${change?`<div style="margin-top:6px"><span class="pill" style="color:${t.c};background:${t.bg}">${change}</span></div>`:''}</div>`;
}

// ═══ PAGE RENDERERS ═════════════════════════════════════════════

function renderOverview() {
  return `<div class="page-content">
    <div class="page-header"><div><h1>Overview</h1><p>Your pricing health at a glance</p></div></div>
    <div class="grid-4 mb-20">
      ${makeKPI("Revenue (30d)","€47,820","↑ 12.3% MoM","up")}
      ${makeKPI("Avg Booking Value","€68.50","↑ 4.7%","up")}
      ${makeKPI("Pricing Health","92/100","↑ 8 pts","up")}
      ${makeKPI("Missed Revenue","€3,140","Capture available","down")}
    </div>
    <div class="grid-2 mb-16">
      <div class="card">
        <div class="card-title">Quick Navigation</div>
        <p class="card-sub">Jump to any section</p>
        ${[
          { id:"pricing", icon:"💰", l:"Price Setup & Management", d:"Multi-category pricing, bulk editing, API import" },
          { id:"dynamic", icon:"📈", l:"Dynamic & Seasonal Pricing", d:"Calendar pricing, capacity triggers, early-bird" },
          { id:"deals", icon:"🏷️", l:"Deals & Promotions", d:"Flash sales, group discounts, coupon codes" },
          { id:"yield", icon:"📊", l:"Yield & Revenue Intelligence", d:"Demand forecasts, RevPAS, conversion analytics" },
          { id:"bench", icon:"🏆", l:"Market Benchmarking", d:"Competitor pricing, GYG recommended price" },
          { id:"payout", icon:"💳", l:"Payout & Commission", d:"Net payout calculator, commission breakdown" },
          { id:"parity", icon:"🌐", l:"Price Parity", d:"Multi-channel comparison, parity alerts" },
          { id:"ux", icon:"📱", l:"Tools & Settings", d:"CSV import/export, audit log, tooltips" },
        ].map(n => `<div class="quick-nav" onclick="goTo('${n.id}')">
          <span style="font-size:22px">${n.icon}</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--dk)">${n.l}</div><div style="font-size:11px;color:var(--g500)">${n.d}</div></div>
          <span style="color:var(--g400)">›</span>

function renderRevenueSim() {
  let curTot = 0, projTot = 0;
  const rows = EXP.map(e => {
    const np = state.overrides[e.id] !== undefined ? state.overrides[e.id] : e.sug;
    const el = np > e.cur ? -0.3 : np < e.cur ? 0.15 : 0;
    const pd = (np - e.cur) / e.cur;
    const pb = Math.round(e.book30 * (1 + pd * el));
    const cr = e.cur * e.book30;
    const pr = np * pb;
    curTot += cr; projTot += pr;
    return { ...e, np, pb, cr, pr };
  });
  const delta = projTot - curTot;
  const pos = delta >= 0;
  const pctC = ((delta / curTot) * 100).toFixed(1);

  return `<div class="card">
    <div class="card-title">💡 Revenue Impact Simulator</div>
    <p class="card-sub">Projected 30-day impact · Accounts for demand elasticity</p>
    <div class="grid-3 mb-20">
      <div style="background:var(--g50);border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:1px;font-weight:500">Current Revenue</div>
        <div style="font-size:22px;font-weight:700;color:var(--dk);margin-top:4px">${fmt(curTot)}</div>
      </div>
      <div style="background:var(--g50);border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:1px;font-weight:500">Projected Revenue</div>
        <div style="font-size:22px;font-weight:700;color:${pos?'var(--grn)':'var(--red)'};margin-top:4px">${fmt(Math.round(projTot))}</div>
      </div>
      <div style="background:${pos?'var(--grnL)':'var(--redL)'};border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:10px;color:${pos?'var(--grn)':'var(--red)'};text-transform:uppercase;letter-spacing:1px;font-weight:600">Net Impact</div>
        <div style="font-size:22px;font-weight:700;color:${pos?'var(--grn)':'var(--red)'};margin-top:4px">${pos?'+':''}${fmt(Math.round(delta))}</div>
        <div style="font-size:11px;color:${pos?'var(--grn)':'var(--red)'}">${pos?'+':''}${pctC}% monthly</div>
      </div>
    </div>
    ${rows.map(r => {
      const d = r.pr - r.cr;
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--g100)">
        <span style="font-size:16px">${r.icon}</span>
        <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--dk);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</div><div style="font-size:11px;color:var(--g500)">${fmtD(r.cur)} → ${fmtD(r.np)} · ${r.book30} → ${r.pb} bookings</div></div>
        <div style="width:90px;height:5px;background:var(--g100);border-radius:3px;overflow:hidden"><div style="width:${Math.min(Math.abs(d)/50,100)}%;height:100%;border-radius:3px;background:${d>=0?'var(--grn)':'var(--red)'}"></div></div>
        <div style="width:70px;text-align:right;font-size:13px;font-weight:700;color:${d>=0?'var(--grn)':'var(--red)'}">${d>=0?'+':''}${fmt(Math.round(d))}</div>
      </div>`;
    }).join('')}
  </div>`;
}

          const bg = s==="green"?"var(--grnL)":s==="amber"?"var(--ambL)":"var(--redL)";
          const msg = s==="green"?"✅ Well-priced for conversion":s==="amber"?"⚠️ Slightly off-optimal":"🔴 Adjust to improve bookings";
          return `<div style="padding:14px;border-radius:10px;border:1px solid ${bc}33;background:${bg}">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span>${e.icon}</span><span style="font-size:12px;font-weight:600;color:var(--dk)">${e.name}</span></div>

            <div style="font-size:11px;color:var(--g500);margin-top:4px">${msg}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function renderParity() {
  const chs = [{n:"GetYourGuide",c:"var(--red)"},{n:"Viator",c:"#2A9D8F"},{n:"Klook",c:"#E76F51"},{n:"Direct Website",c:"var(--blu)"}];
  const pd = EXP.slice(0,4).map(e => ({...e, ps:{ GetYourGuide:e.cur, Viator:e.cur-Math.round(Math.sin(e.id)*3), Klook:e.cur+Math.round(Math.cos(e.id)*2), "Direct Website":e.cur-Math.round(Math.sin(e.id*2)*2) }}));
  return `<div class="page-content">
    <div class="page-header"><div><h1>Multi-Channel Price Parity</h1><p>Monitor pricing across GYG, Viator, Klook, and your direct site</p></div></div>

      ${makeKPI("Parity Score","78%","2 alerts active","down",true)}

        const gygLow = e.ps.GetYourGuide === low;
        return `<div style="padding:14px 0;border-bottom:1px solid var(--g100)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">

            const p = e.ps[ch.n]; const isLow = p === low;

// ═══ ROUTING & RENDERING ════════════════════════════════════════

const pages = {
  overview: renderOverview,
  pricing: renderPricing,
  dynamic: renderDynamic,
  deals: renderDeals,
  yield: renderYield,
  bench: renderBench,
  ai: renderAI,
  payout: renderPayout,
  parity: renderParity,
  ux: renderUX,
};

function render() {
  const main = document.getElementById('mainContent');
  const fn = pages[state.page];
  if (fn) main.innerHTML = fn();

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === state.page);
  });
}

function goTo(pageId) {
  state.page = pageId;
  render();
  document.getElementById('mainContent').scrollTop = 0;
}

// ═══ ACTIONS ════════════════════════════════════════════════════

function startEdit(id, currentVal) {
  const container = document.getElementById('ep-' + id);
  if (!container) return;
  container.innerHTML = `
    <input class="edit-input" id="ei-${id}" value="${currentVal}" onkeydown="if(event.key==='Enter')saveEdit(${id});if(event.key==='Escape')render()">
    <button class="edit-save" onclick="saveEdit(${id})"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
    <button class="edit-cancel" onclick="render()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  `;
  document.getElementById('ei-' + id).focus();
}

function saveEdit(id) {
  const input = document.getElementById('ei-' + id);
  const val = parseFloat(input.value);
  if (!isNaN(val) && val > 0) {
    state.overrides[id] = val;
  }
  render();
}

function resetPrice(id) {
  delete state.overrides[id];
  render();
}

function applyOne(id) {
  state.applied.add(id);
  render();
}

function applyAll() {
  EXP.forEach(e => {
    const np = state.overrides[e.id] !== undefined ? state.overrides[e.id] : e.sug;
    if (getStatus(e.cur, np) !== 'optimal') state.applied.add(e.id);
  });
  render();
}

function toggleRule(key) {
  state.rules[key] = !state.rules[key];
  render();
}

// ═══ INIT ═══════════════════════════════════════════════════════

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => goTo(el.dataset.page));
});

render();
</script>
